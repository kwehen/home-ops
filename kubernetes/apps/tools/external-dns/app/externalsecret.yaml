apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns
  namespace: self-hosted
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pihole-external-dns
    creationPolicy: 'Orphan'
  data:
  - secretKey: pihole-password
    remoteRef:
      key: kube/external-dns
      property: pihole-password