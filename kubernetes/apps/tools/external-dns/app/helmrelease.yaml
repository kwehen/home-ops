---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-pihole1
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: 0.21.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    provider:
      name: pihole
    extraArgs:
      - --pihole-api-version=6
      - --pihole-tls-skip-verify
      - --pihole-server=https://10.0.0.50
    policy: upsert-only
    sources: ["ingress", "service"]
    registry: noop
    domainFilters: ["kamaufoundation.com", "kamau.cloud"]
    env:
      - name: &name EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: pihole-password
            key: *name
    serviceMonitor:
      enabled: true
