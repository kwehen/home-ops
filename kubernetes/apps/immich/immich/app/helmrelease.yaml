apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 1m
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    postgres:
      enabled: false

    immich:
      # metrics:
      #   enabled: true
      persistence:
        library:
          existingClaim: photo-library
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: docker.io/valkey/valkey
                tag: 9.1-alpine@sha256:355ae2c6c965769a0d9b9810711e6befd5b79fe676d1faa848247733ad6a4408
                pullPolicy: IfNotPresent
      persistence:
        data:
          enabled: true
          size: 1Gi
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce

    controllers:
      main:
        labels: 
          datadoghq.com/apm-instrumentation: "disabled"
        containers:
          main:
            image:
              tag: v2.7.5
            env:
              LOG_LEVEL: verbose
              TZ: ${TIMEZONE}
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_HOSTNAME
              DD_TRACE_ENABLED: false
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_PASSWORD
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_DATABASE_NAME

    server:
      resources:
        requests:
          cpu: 1000m
          memory: 4096M
      ingress:
        main:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production-external
            traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.middlewares: |
              networking-cloudflare-only@kubernetescrd,
              networking-request-limit@kubernetescrd
          hosts:
            - host: photos.${EXTERNAL_DOMAIN}
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - photos.${EXTERNAL_DOMAIN}
              secretName: immich-tls
      probes:
        liveness:
          spec:
            initialDelaySeconds: 120
        readiness:
          spec:
            initialDelaySeconds: 120

    machine-learning:
      resources:
        requests:
          cpu: 1000m
          memory: 4096M
      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: immich-machine-learning-cache
      probes:
        liveness:
          spec:
            initialDelaySeconds: 120
        readiness:
          spec:
            initialDelaySeconds: 120