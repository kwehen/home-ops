
name: OpenTelemetry
on:
  workflow_run:
    workflows:
      - Renovate
    types:
      - completed
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/workflow@v5.47.2
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Api-Token ${{ secrets.DYNATRACE_API_KEY }}"
    permissions:
      actions: read
